<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultado Matriz</title>
</head>
<body>
<h1>Resultados de la Simulación</h1>

<h2>Ancho de la matriz: <span th:text="${datos.anchoMatriz}"></span></h2>

<h3>Celdas a pintar:</h3>
<ul>
    <li th:each="celda : ${datos.celdas}">
        Tiempo: <strong th:text="${celda.tiempo}"></strong> |
        Posición: [<span th:text="${celda.posX}"></span>, <span th:text="${celda.posY}"></span>] |
        Color: <strong th:text="${celda.color}" th:style="'color:' + ${celda.color}"></strong>
    </li>
</ul>

<a href="/solicitud">Volver a inicio</a>
</body>
</html>
